<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Атлетика — CRM</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = 'login.html';

const user = getCurrentUser();
renderLayout('Главная', 'dashboard');

const content = document.getElementById('pageContent');

const roleName = { 1: 'Администратор', 2: 'Тренер', 3: 'Клиент' }[user.roleId] || '';

// Dashboard differs by role
if (isAdmin()) {
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Добро пожаловать, ${user.fullName.split(' ')[0]}</div>
        <div class="page-sub">Панель управления фитнес-клубом «Атлетика»</div>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-icon blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div><div class="stat-label">Клиентов</div><div class="stat-value" id="statClients">—</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/></svg></div><div><div class="stat-label">Тренеров</div><div class="stat-value" id="statTrainers">—</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="stat-label">Тренировок</div><div class="stat-value" id="statWorkouts">—</div></div></div>
      <div class="stat-card"><div class="stat-icon purple"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div><div class="stat-label">Абонементов</div><div class="stat-value" id="statMemberships">—</div></div></div>
    </div>

    <div class="two-col">
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot"></span>Ближайшие тренировки</div>
          <a href="pages/workouts.html" class="btn-outline" style="font-size:12px;padding:6px 12px;">Все</a>
        </div>
        <table class="fc-table">
          <thead><tr><th>Тип</th><th>Тренер</th><th>Дата</th><th>Мест</th></tr></thead>
          <tbody id="upcomingBody"><tr><td colspan="4"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
        </table>
      </div>
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot" style="background:var(--purple)"></span>Активные абонементы</div>
          <a href="pages/memberships.html" class="btn-outline" style="font-size:12px;padding:6px 12px;">Все</a>
        </div>
        <table class="fc-table">
          <thead><tr><th>Клиент</th><th>Тариф</th><th>До</th></tr></thead>
          <tbody id="membershipsBody"><tr><td colspan="3"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
        </table>
      </div>
    </div>
    <div id="apiErr" class="d-none" style="margin-top:16px">
      <div class="alert alert-warning">API недоступен. Убедитесь что ASP.NET запущен (F5). Адрес: <strong>${API_BASE}</strong></div>
    </div>
  `;
  loadAdminDashboard();

} else if (isTrainer()) {
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Добро пожаловать, ${user.fullName.split(' ')[0]}</div>
        <div class="page-sub">Ваше расписание и записи клиентов</div>
      </div>
    </div>
    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title"><span class="title-dot"></span>Мои ближайшие тренировки</div>
        <a href="pages/workouts.html" class="btn-outline" style="font-size:12px;padding:6px 12px;">Все</a>
      </div>
      <table class="fc-table">
        <thead><tr><th>Тип</th><th>Дата</th><th>Участников</th></tr></thead>
        <tbody id="trainerBody"><tr><td colspan="3"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
      </table>
    </div>
  `;
  loadTrainerDashboard();

} else if (isClient()) {
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Добро пожаловать, ${user.fullName.split(' ')[0]}</div>
        <div class="page-sub">Ваши тренировки и абонемент</div>
      </div>
    </div>
    <div class="two-col">
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot"></span>Ближайшие тренировки</div>
          <a href="pages/workouts.html" class="btn-outline" style="font-size:12px;padding:6px 12px;">Записаться</a>
        </div>
        <table class="fc-table">
          <thead><tr><th>Тип</th><th>Тренер</th><th>Дата</th></tr></thead>
          <tbody id="clientBody"><tr><td colspan="3"><div class="loading-row"><span class="spinner"></span></div></td></tr></tbody>
        </table>
      </div>
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot" style="background:var(--purple)"></span>Мой абонемент</div>
          <a href="pages/memberships.html" class="btn-outline" style="font-size:12px;padding:6px 12px;">Подробнее</a>
        </div>
        <table class="fc-table">
          <thead><tr><th>Тариф</th><th>До</th><th>Посещений</th></tr></thead>
          <tbody id="clientMemberBody"><tr><td colspan="3"><div class="loading-row"><span class="spinner"></span></div></td></tr></tbody>
        </table>
      </div>
    </div>
  `;
  loadClientDashboard();
}

async function loadAdminDashboard() {
  try {
    const [users, workouts, memberships] = await Promise.all([
      api.get('/users'), api.get('/workouts/upcoming'), api.get('/clientmemberships/active')
    ]);
    document.getElementById('statClients').textContent     = users.filter(u => u.roleId === 3).length;
    document.getElementById('statTrainers').textContent    = users.filter(u => u.roleId === 2).length;
    document.getElementById('statWorkouts').textContent    = workouts.length;
    document.getElementById('statMemberships').textContent = memberships.length;

    const up = document.getElementById('upcomingBody');
    up.innerHTML = workouts.slice(0,5).length
      ? workouts.slice(0,5).map(w => `<tr>
          <td><strong>${w.workoutTypeName || '—'}</strong></td>
          <td class="muted">${w.trainerName || '—'}</td>
          <td class="muted">${fmtDate(w.workoutDate)}</td>
          <td>${w.currentParticipants ?? 0}/${w.maxParticipants}</td>
        </tr>`).join('')
      : emptyRow(4, 'Нет предстоящих тренировок');

    const mb = document.getElementById('membershipsBody');
    mb.innerHTML = memberships.slice(0,5).length
      ? memberships.slice(0,5).map(m => `<tr>
          <td>${m.clientName || '—'}</td>
          <td class="muted">${m.planName || '—'}</td>
          <td class="muted">${fmtDateShort(m.expiryDate)}</td>
        </tr>`).join('')
      : emptyRow(3, 'Нет активных абонементов');
  } catch(e) {
    ['statClients','statTrainers','statWorkouts','statMemberships'].forEach(id => document.getElementById(id).textContent = '0');
    document.getElementById('upcomingBody').innerHTML = emptyRow(4, 'Нет данных');
    document.getElementById('membershipsBody').innerHTML = emptyRow(3, 'Нет данных');
    document.getElementById('apiErr').classList.remove('d-none');
  }
}

async function loadTrainerDashboard() {
  try {
    const workouts = await api.get('/workouts/upcoming');
    const mine = workouts.filter(w => w.trainerId === user.id);
    document.getElementById('trainerBody').innerHTML = mine.slice(0,8).length
      ? mine.slice(0,8).map(w => `<tr>
          <td><strong>${w.workoutTypeName || '—'}</strong></td>
          <td class="muted">${fmtDate(w.workoutDate)}</td>
          <td>${w.currentParticipants ?? 0}/${w.maxParticipants}</td>
        </tr>`).join('')
      : emptyRow(3, 'Нет предстоящих тренировок');
  } catch(e) {
    document.getElementById('trainerBody').innerHTML = emptyRow(3, 'Ошибка загрузки');
  }
}

async function loadClientDashboard() {
  try {
    const workouts = await api.get('/workouts/upcoming');
    document.getElementById('clientBody').innerHTML = workouts.slice(0,5).length
      ? workouts.slice(0,5).map(w => `<tr>
          <td><strong>${w.workoutTypeName || '—'}</strong></td>
          <td class="muted">${w.trainerName || '—'}</td>
          <td class="muted">${fmtDate(w.workoutDate)}</td>
        </tr>`).join('')
      : emptyRow(3, 'Нет тренировок');
  } catch(e) { document.getElementById('clientBody').innerHTML = emptyRow(3, 'Ошибка'); }

  try {
    const memberships = await api.get('/clientmemberships/active');
    const mine = memberships.filter(m => m.clientId === user.id || m.userId === user.id);
    document.getElementById('clientMemberBody').innerHTML = mine.length
      ? mine.map(m => `<tr>
          <td><strong>${m.planName || '—'}</strong></td>
          <td class="muted">${fmtDateShort(m.expiryDate)}</td>
          <td><span class="badge badge-green">${m.visitsUsed ?? 0} / ${m.allowedVisits ?? '∞'}</span></td>
        </tr>`).join('')
      : emptyRow(3, 'Нет активного абонемента');
  } catch(e) { document.getElementById('clientMemberBody').innerHTML = emptyRow(3, 'Ошибка'); }
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function fmtDateShort(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU');
}

function emptyRow(cols, msg) {
  return `<tr><td colspan="${cols}"><div class="empty-state">
    <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
    <p>${msg}</p></div></td></tr>`;
}
</script>
</body>
</html>
