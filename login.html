<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход — Атлетика CRM</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<script src="js/api.js"></script>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>
      <div class="auth-title">Атлетика CRM</div>
      <div class="auth-sub">Фитнес-клуб — система управления</div>
    </div>

    <div id="errAlert" class="alert alert-error d-none"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="fEmail" placeholder="your@email.ru" autocomplete="email"/>
    </div>

    <div class="form-group" style="margin-bottom:22px">
      <label class="form-label">Пароль</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="fPassword" placeholder="••••••••" autocomplete="current-password"/>
        <button onclick="togglePwd()" style="position:absolute;top:50%;right:12px;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;line-height:1;" title="Показать пароль">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Войти</button>

    <div class="auth-divider">или</div>

    <div class="auth-link">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script>
if (localStorage.getItem('fc_user')) window.location.href = 'index.html';

function togglePwd() {
  const f = document.getElementById('fPassword');
  f.type = f.type === 'password' ? 'text' : 'password';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email    = document.getElementById('fEmail').value.trim();
  const password = document.getElementById('fPassword').value;
  const errEl    = document.getElementById('errAlert');
  const btn      = document.getElementById('loginBtn');

  errEl.classList.add('d-none');

  if (!email || !password) {
    errEl.textContent = 'Введите email и пароль';
    errEl.classList.remove('d-none');
    return;
  }

  btn.textContent = 'Вход...';
  btn.disabled = true;

  try {
    const users = await api.get('/Users');
    const user = users.find(u => u.email && u.email.toLowerCase() === email.toLowerCase());

    if (!user) throw new Error('Пользователь с таким email не найден');

    // Проверка пароля через SHA-256
    const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
    const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');

    if (user.passwordHash && user.passwordHash.toLowerCase() !== hashHex.toLowerCase()) {
      throw new Error('Неверный пароль');
    }

    localStorage.setItem('fc_user', JSON.stringify({
      id: user.id,
      fullName: user.fullName,
      email: user.email,
      roleId: user.roleId,
      roleName: user.roleName
    }));

    window.location.href = 'index.html';

  } catch(e) {
    errEl.textContent = e.message || 'Ошибка входа. Проверьте данные.';
    errEl.classList.remove('d-none');
    btn.textContent = 'Войти';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
