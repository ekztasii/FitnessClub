<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Администраторы — Атлетика CRM</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/validation.js"></script>
<script src="../js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = '../login.html';
renderLayout('Администраторы', 'admins');
</script>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Добавить администратора</div>
    <input type="hidden" id="mId"/>
    <div class="form-group"><label class="form-label">ФИО</label><input type="text" class="form-control" id="mName" placeholder="Иванов Иван Иванович"/></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="mEmail" placeholder="admin@fitness.ru"/></div>
    <div class="form-group"><label class="form-label">Телефон</label><input type="text" class="form-control" id="mPhone" placeholder="+7 999 000 00 00"/></div>
    <div class="form-group" id="pwdGroup"><label class="form-label">Пароль</label><input type="password" class="form-control" id="mPassword" placeholder="Минимум 6 символов"/></div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('modal')">Отмена</button>
      <button class="btn-modal-save" onclick="saveAdmin()">Сохранить</button>
    </div>
  </div>
</div>

<script>
if (!requireRole([1])) {} else {
  const me = getCurrentUser();
  const content = document.getElementById('pageContent');
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Администраторы</div>
        <div class="page-sub">Управление учётными записями администраторов</div>
      </div>
      <button class="btn-add" onclick="openAdd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить администратора
      </button>
    </div>
    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title"><span class="title-dot" style="background:var(--purple)"></span>Список администраторов</div>
      </div>
      <table class="fc-table">
        <thead><tr><th>#</th><th>ФИО</th><th>Телефон</th><th>Email</th><th>Действия</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
      </table>
    </div>
  `;
  loadAdmins();
}

const me = getCurrentUser();
let allAdmins = [];

async function loadAdmins() {
  try {
    const all = await api.get('/Users');
    allAdmins = all.filter(u => u.roleId === 1);
    renderTable();
  } catch(e) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--red);padding:24px">Ошибка загрузки</td></tr>`;
  }
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  if (!allAdmins.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>Администраторы не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = allAdmins.map((a, i) => `
    <tr>
      <td class="muted">${i+1}</td>
      <td>
        <strong>${a.fullName}</strong>
        ${a.id === me.id ? '<span class="badge badge-purple" style="margin-left:6px;font-size:10px">Вы</span>' : ''}
      </td>
      <td class="muted">${a.phoneNumber || '—'}</td>
      <td class="muted">${a.email || '—'}</td>
      <td style="display:flex;gap:4px">
        <button class="btn-icon" onclick='openEdit(${JSON.stringify(a)})' title="Редактировать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        ${a.id !== me.id ? `
        <button class="btn-icon danger" onclick="deleteAdmin(${a.id}, '${a.fullName.replace(/'/g,'')}')" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>` : '<span style="font-size:11px;color:var(--text-dim);padding:0 4px">нельзя удалить себя</span>'}
      </td>
    </tr>
  `).join('');
}

function openAdd() {
  document.getElementById('modalTitle').textContent = 'Добавить администратора';
  ['mId','mName','mEmail','mPhone','mPassword'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pwdGroup').style.display = 'block';
  openModal('modal');
}

function openEdit(a) {
  document.getElementById('modalTitle').textContent = 'Редактировать администратора';
  document.getElementById('mId').value = a.id;
  document.getElementById('mName').value = a.fullName;
  document.getElementById('mEmail').value = a.email || '';
  document.getElementById('mPhone').value = a.phoneNumber || '';
  document.getElementById('mPassword').value = '';
  document.getElementById('pwdGroup').style.display = 'none';
  openModal('modal');
}

async function saveAdmin() {
  const id = document.getElementById('mId').value;
  const body = {
    roleId: 1,
    fullName: document.getElementById('mName').value.trim(),
    email: document.getElementById('mEmail').value.trim(),
    phoneNumber: document.getElementById('mPhone').value.trim() || null,
    password: document.getElementById('mPassword').value || 'admin123'
  };
  const nameEl = document.getElementById('mName');
  const emailEl = document.getElementById('mEmail');
  const phoneEl = document.getElementById('mPhone');
  const passEl  = document.getElementById('mPassword');
  let ok = true;
  ok = Validate.check(nameEl,  v => Validate.fullName(v)) && ok;
  ok = Validate.check(emailEl, v => Validate.email(v))    && ok;
  ok = Validate.check(phoneEl, v => Validate.phone(v))    && ok;
  if (!id) ok = Validate.check(passEl, v => Validate.password(v)) && ok;
  if (!ok) return;
  try {
    if (id) await api.put('/Users/' + id, body);
    else await api.post('/Users', body);
    closeModal('modal');
    loadAdmins();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function deleteAdmin(id, name) {
  if (!confirm(`Удалить администратора "${name}"?`)) return;
  try {
    await api.delete('/Users/' + id);
    loadAdmins();
  } catch(e) {
    alert('Не удалось удалить: ' + e.message);
  }
}
</script>
</body>
</html>
