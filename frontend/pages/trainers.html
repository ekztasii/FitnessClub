<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тренеры — Атлетика CRM</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/validation.js"></script>
<script src="../js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = '../login.html';
renderLayout('Тренеры', 'trainers');
</script>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Добавить тренера</div>
    <input type="hidden" id="mId"/>
    <div class="form-group"><label class="form-label">ФИО</label><input type="text" class="form-control" id="mName" placeholder="Петров Пётр Петрович"/></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="mEmail" placeholder="trainer@fitness.ru"/></div>
    <div class="form-group"><label class="form-label">Телефон</label><input type="text" class="form-control" id="mPhone" placeholder="+7 999 111 11 11"/></div>
    <div class="form-group" id="pwdGroup"><label class="form-label">Пароль</label><input type="password" class="form-control" id="mPassword" placeholder="Минимум 6 символов"/></div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('modal')">Отмена</button>
      <button class="btn-modal-save" onclick="saveTrainer()">Сохранить</button>
    </div>
  </div>
</div>

<script>
if (!requireRole([1])) {} else {
  const content = document.getElementById('pageContent');
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Тренеры</div>
        <div class="page-sub">Персонал фитнес-клуба</div>
      </div>
      <button class="btn-add" onclick="openAdd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить тренера
      </button>
    </div>
    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title"><span class="title-dot" style="background:var(--green)"></span>Список тренеров</div>
        <input class="search-input" id="search" placeholder="Поиск..." oninput="filterTable()"/>
      </div>
      <table class="fc-table">
        <thead><tr><th>#</th><th>ФИО</th><th>Телефон</th><th>Email</th><th>Действия</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
      </table>
    </div>
  `;
  loadTrainers();
}

let allTrainers = [];

async function loadTrainers() {
  try {
    const all = await api.get('/Users');
    allTrainers = all.filter(u => u.roleId === 2);
    renderTable(allTrainers);
  } catch(e) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--red);padding:24px">Ошибка загрузки</td></tr>`;
  }
}

function renderTable(list) {
  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/></svg></div>
      <p>Тренеры не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map((t, i) => `
    <tr>
      <td class="muted">${i+1}</td>
      <td><strong>${t.fullName}</strong></td>
      <td class="muted">${t.phoneNumber || '—'}</td>
      <td class="muted">${t.email || '—'}</td>
      <td style="display:flex;gap:4px">
        <button class="btn-icon" onclick='openEdit(${JSON.stringify(t)})' title="Редактировать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon danger" onclick="deleteTrainer(${t.id}, '${t.fullName.replace(/'/g,'')}')" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </td>
    </tr>
  `).join('');
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  renderTable(allTrainers.filter(t => t.fullName.toLowerCase().includes(q) || (t.email||'').toLowerCase().includes(q)));
}

function openAdd() {
  document.getElementById('modalTitle').textContent = 'Добавить тренера';
  ['mId','mName','mEmail','mPhone','mPassword'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pwdGroup').style.display = 'block';
  openModal('modal');
}

function openEdit(t) {
  document.getElementById('modalTitle').textContent = 'Редактировать тренера';
  document.getElementById('mId').value = t.id;
  document.getElementById('mName').value = t.fullName;
  document.getElementById('mEmail').value = t.email || '';
  document.getElementById('mPhone').value = t.phoneNumber || '';
  document.getElementById('mPassword').value = '';
  document.getElementById('pwdGroup').style.display = 'none';
  openModal('modal');
}

async function saveTrainer() {
  const id = document.getElementById('mId').value;
  const body = {
    roleId: 2,
    fullName: document.getElementById('mName').value.trim(),
    email: document.getElementById('mEmail').value.trim(),
    phoneNumber: document.getElementById('mPhone').value.trim() || null,
    password: document.getElementById('mPassword').value || 'trainer123'
  };
  const nameEl = document.getElementById('mName');
  const emailEl = document.getElementById('mEmail');
  const phoneEl = document.getElementById('mPhone');
  const passEl  = document.getElementById('mPassword');
  let ok = true;
  ok = Validate.check(nameEl,  v => Validate.fullName(v)) && ok;
  ok = Validate.check(emailEl, v => Validate.email(v))    && ok;
  ok = Validate.check(phoneEl, v => Validate.phone(v))    && ok;
  if (!id) ok = Validate.check(passEl, v => Validate.password(v)) && ok;
  if (!ok) return;
  try {
    if (id) await api.put('/Users/' + id, body);
    else await api.post('/Users', body);
    closeModal('modal');
    loadTrainers();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function deleteTrainer(id, name) {
  if (!confirm(`Удалить тренера "${name}"?\n\nБудут также удалены все его тренировки, типы тренировок и записи клиентов.`)) return;
  showLoading(true);
  try {
    // 1. Удаляем записи на тренировки тренера
    try {
      const workouts = await api.get('/Workouts/by-trainer/' + id);
      for (const w of workouts) {
        try {
          const regs = await api.get('/WorkoutRegistrations/by-workout/' + w.id);
          for (const r of regs) { try { await api.delete('/WorkoutRegistrations/' + r.id); } catch(e) {} }
        } catch(e) {}
        try { await api.delete('/Workouts/' + w.id); } catch(e) {}
      }
    } catch(e) {}
    // 2. Удаляем типы тренировок тренера
    try {
      const types = await api.get('/WorkoutTypes/by-trainer/' + id);
      for (const t of types) { try { await api.delete('/WorkoutTypes/' + t.id); } catch(e) {} }
    } catch(e) {}
    // 3. Удаляем самого тренера
    await api.delete('/Users/' + id);
    loadTrainers();
  } catch(e) {
    alert('Не удалось удалить тренера: ' + e.message);
  } finally {
    showLoading(false);
  }
}

function showLoading(on) {
  let el = document.getElementById('loadingOverlay');
  if (on) {
    if (!el) {
      el = document.createElement('div');
      el.id = 'loadingOverlay';
      el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
      el.innerHTML = '<div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:28px 40px;display:flex;align-items:center;gap:14px;color:var(--text);font-size:14px"><span class="spinner"></span> Удаление...</div>';
      document.body.appendChild(el);
    }
  } else {
    if (el) el.remove();
  }
}
</script>
</body>
</html>
