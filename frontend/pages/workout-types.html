<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Типы тренировок — Атлетика CRM</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/validation.js"></script>
<script src="../js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = '../login.html';
renderLayout('Типы тренировок', 'workout-types');
</script>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Добавить тип тренировки</div>
    <input type="hidden" id="mId"/>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input type="text" class="form-control" id="mTypeName" placeholder="Например: Силовая, Кардио, Йога"/>
    </div>
    <div class="form-group">
      <label class="form-label">Описание</label>
      <input type="text" class="form-control" id="mDesc" placeholder="Краткое описание тренировки"/>
    </div>
    <div class="form-group">
      <label class="form-label">Уровень сложности</label>
      <select class="form-control" id="mLevel">
        <option value="1">1 — Начинающий</option>
        <option value="2">2 — Средний</option>
        <option value="3">3 — Продвинутый</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Тренер</label>
      <select class="form-control" id="mTrainer"></select>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('modal')">Отмена</button>
      <button class="btn-modal-save" onclick="saveType()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const canEdit = isAdmin() || isTrainer();
const content = document.getElementById('pageContent');

content.innerHTML = `
  <div class="page-header">
    <div>
      <div class="page-title">Типы тренировок</div>
      <div class="page-sub">Категории и направления тренировок</div>
    </div>
    ${canEdit ? `<button class="btn-add" onclick="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить тип
    </button>` : ''}
  </div>
  <div class="table-card">
    <div class="table-card-head">
      <div class="table-card-title"><span class="title-dot" style="background:var(--purple)"></span>Список типов</div>
    </div>
    <table class="fc-table">
      <thead><tr><th>#</th><th>Название</th><th>Описание</th><th>Уровень</th><th>Тренер</th>${canEdit ? '<th>Действия</th>' : ''}</tr></thead>
      <tbody id="tbody"><tr><td colspan="${canEdit ? 6 : 5}"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
    </table>
  </div>
`;

function levelBadge(lvl) {
  const labels = { 1: 'Начинающий', 2: 'Средний', 3: 'Продвинутый' };
  const cls    = { 1: 'badge-green', 2: 'badge-yellow', 3: 'badge-red' };
  return `<span class="badge ${cls[lvl] || 'badge-gray'}">${lvl} — ${labels[lvl] || 'Уровень ' + lvl}</span>`;
}

let allTypes = [], trainers = [];

async function loadTypes() {
  try {
    allTypes = await api.get('/WorkoutTypes');
    renderTable();
  } catch(e) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--red);padding:24px">Ошибка загрузки</td></tr>`;
  }
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const cols = canEdit ? 6 : 5;
  if (!allTypes.length) {
    tbody.innerHTML = `<tr><td colspan="${cols}"><div class="empty-state">
      <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></div>
      <p>Типы не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = allTypes.map((t, i) => `
    <tr>
      <td class="muted">${i + 1}</td>
      <td><strong>${t.typeName || '—'}</strong></td>
      <td class="muted">${t.description || '—'}</td>
      <td>${levelBadge(t.workoutTypeLvl)}</td>
      <td class="muted">${t.trainerName || '—'}</td>
      ${canEdit ? `<td>
        <button class="btn-icon" onclick='openEdit(${JSON.stringify(t)})' title="Редактировать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon danger" onclick="deleteType(${t.id})" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </td>` : ''}
    </tr>
  `).join('');
}

async function loadTrainers() {
  if (!trainers.length) {
    const all = await api.get('/Users');
    trainers = all.filter(u => u.roleId === 2);
  }
  document.getElementById('mTrainer').innerHTML = trainers.map(t => `<option value="${t.id}">${t.fullName}</option>`).join('');
}

async function openAdd() {
  document.getElementById('modalTitle').textContent = 'Добавить тип тренировки';
  document.getElementById('mId').value = '';
  document.getElementById('mTypeName').value = '';
  document.getElementById('mDesc').value = '';
  document.getElementById('mLevel').value = '1';
  await loadTrainers();
  openModal('modal');
}

async function openEdit(t) {
  document.getElementById('modalTitle').textContent = 'Редактировать тип';
  document.getElementById('mId').value = t.id;
  document.getElementById('mTypeName').value = t.typeName || '';
  document.getElementById('mDesc').value = t.description || '';
  document.getElementById('mLevel').value = t.workoutTypeLvl || 1;
  await loadTrainers();
  document.getElementById('mTrainer').value = t.userId;
  openModal('modal');
}

async function saveType() {
  const id = document.getElementById('mId').value;
  const body = {
    workoutTypeLvl: parseInt(document.getElementById('mLevel').value),
    userId: parseInt(document.getElementById('mTrainer').value),
    typeName: document.getElementById('mTypeName').value.trim(),
    description: document.getElementById('mDesc').value.trim()
  };
  const typeNameEl = document.getElementById('mTypeName');
  let ok = Validate.check(typeNameEl, v => Validate.required(v, 'Название'));
  if (!ok) return;
  try {
    if (id) await api.put('/WorkoutTypes/' + id, body);
    else await api.post('/WorkoutTypes', body);
    closeModal('modal');
    loadTypes();
  } catch(e) { alert('Ошибка: ' + e.message); }
}


function showDeleteError(hint) {
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  box.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:28px;max-width:420px;width:100%">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:36px;height:36px;background:var(--red-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div style="font-family:Syne,sans-serif;font-size:16px;font-weight:700;color:var(--text)">Невозможно удалить</div>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6">${hint}</p>
    <button onclick="this.closest('[style*=position]').remove()" style="width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">Понятно</button>
  </div>`;
  document.body.appendChild(box);
}

function isConstraintError(msg) {
  return msg.includes('REFERENCE') || msg.includes('conflict') || msg.includes('FK_') || msg.includes('foreign key');
}

async function deleteType(id) {
  if (!confirm('Удалить тип тренировки?')) return;
  try {
    await api.delete('/WorkoutTypes/' + id);
    loadTypes();
  } catch(e) {
    if (isConstraintError(e.message)) {
      showDeleteError('Этот тип тренировки используется в тренировках. Сначала удалите связанные тренировки в разделе «Тренировки».');
    } else {
      alert('Ошибка: ' + e.message);
    }
  }
}

loadTypes();
</script>
</body>
</html>
