<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тренировки — Атлетика CRM</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/validation.js"></script>
<script src="../js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = '../login.html';
renderLayout('Тренировки', 'workouts');
</script>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Добавить тренировку</div>
    <input type="hidden" id="mId"/>
    <div class="form-group">
      <label class="form-label">Тип тренировки</label>
      <select class="form-control" id="mType"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Тренер</label>
      <select class="form-control" id="mTrainer"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Дата и время</label>
      <input type="datetime-local" class="form-control" id="mDate"/>
    </div>
    <div class="form-group">
      <label class="form-label">Макс. участников</label>
      <input type="number" class="form-control" id="mMax" value="10" min="1"/>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('modal')">Отмена</button>
      <button class="btn-modal-save" onclick="saveWorkout()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const user = getCurrentUser();
const canEdit = isAdmin() || isTrainer();
const content = document.getElementById('pageContent');

content.innerHTML = `
  <div class="page-header">
    <div>
      <div class="page-title">Тренировки</div>
      <div class="page-sub">${isClient() ? 'Расписание тренировок' : 'Управление расписанием'}</div>
    </div>
    ${canEdit ? `<button class="btn-add" onclick="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить тренировку
    </button>` : ''}
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tabAll" onclick="switchTab('all')">Все тренировки</button>
    <button class="tab-btn" id="tabUp" onclick="switchTab('upcoming')">Предстоящие</button>
    ${isTrainer() ? `<button class="tab-btn" id="tabMine" onclick="switchTab('mine')">Мои тренировки</button>` : ''}
  </div>
  <div class="table-card">
    <div class="table-card-head">
      <div class="table-card-title"><span class="title-dot" style="background:var(--yellow)"></span><span id="tableTitle">Все тренировки</span></div>
      <input class="search-input" id="search" placeholder="Поиск по типу/тренеру..." oninput="renderTable()"/>
    </div>
    <table class="fc-table">
      <thead><tr><th>#</th><th>Тип</th><th>Тренер</th><th>Дата и время</th><th>Участники</th>${canEdit ? '<th>Действия</th>' : ''}</tr></thead>
      <tbody id="tbody"><tr><td colspan="${canEdit ? 6 : 5}"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
    </table>
  </div>
`;

let allWorkouts = [], currentTab = 'all';

async function loadWorkouts() {
  try {
    allWorkouts = await api.get('/Workouts');
    renderTable();
  } catch(e) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--red);padding:24px">Ошибка загрузки</td></tr>`;
  }
}

function switchTab(tab) {
  currentTab = tab;
  ['tabAll','tabUp','tabMine'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  document.getElementById(tab === 'all' ? 'tabAll' : tab === 'upcoming' ? 'tabUp' : 'tabMine')?.classList.add('active');
  const titles = { all: 'Все тренировки', upcoming: 'Предстоящие тренировки', mine: 'Мои тренировки' };
  document.getElementById('tableTitle').textContent = titles[tab];
  renderTable();
}

function renderTable() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  let list = [...allWorkouts];
  if (currentTab === 'upcoming') list = list.filter(w => new Date(w.workoutDate) > new Date());
  if (currentTab === 'mine') list = list.filter(w => w.userId === user.id);
  if (q) list = list.filter(w => (w.workoutTypeName||'').toLowerCase().includes(q) || (w.trainerName||'').toLowerCase().includes(q));

  const cols = canEdit ? 6 : 5;
  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="${cols}"><div class="empty-state">
      <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <p>Тренировки не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map((w, i) => {
    const past = new Date(w.workoutDate) < new Date();
    return `<tr>
      <td class="muted">${i + 1}</td>
      <td><strong>${w.workoutTypeName || '—'}</strong></td>
      <td class="muted">${w.trainerName || '—'}</td>
      <td class="muted">${fmtDate(w.workoutDate)}</td>
      <td><span class="badge ${past ? 'badge-gray' : w.currentParticipants >= w.maxParticipants ? 'badge-red' : 'badge-blue'}">${w.currentParticipants ?? 0} / ${w.maxParticipants}</span></td>
      ${canEdit ? `<td style="display:flex;gap:4px">
        <button class="btn-icon" onclick='openEdit(${JSON.stringify(w)})' title="Редактировать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon danger" onclick="deleteWorkout(${w.id})" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </td>` : ''}
    </tr>`;
  }).join('');
}

let workoutTypes = [], trainers = [];

async function loadSelects() {
  if (!workoutTypes.length) workoutTypes = await api.get('/WorkoutTypes');
  if (!trainers.length) {
    const all = await api.get('/Users');
    trainers = all.filter(u => u.roleId === 2);
  }
  document.getElementById('mType').innerHTML = workoutTypes.map(t =>
    `<option value="${t.id}">${t.typeName || 'Тип ' + t.id}</option>`
  ).join('');
  document.getElementById('mTrainer').innerHTML = trainers.map(t =>
    `<option value="${t.id}">${t.fullName}</option>`
  ).join('');
}

async function openAdd() {
  document.getElementById('modalTitle').textContent = 'Добавить тренировку';
  document.getElementById('mId').value = '';
  document.getElementById('mMax').value = '10';
  document.getElementById('mDate').value = '';
  await loadSelects();
  // Тренер по умолчанию выбирает себя
  if (isTrainer()) document.getElementById('mTrainer').value = user.id;
  openModal('modal');
}

async function openEdit(w) {
  document.getElementById('modalTitle').textContent = 'Редактировать тренировку';
  document.getElementById('mId').value = w.id;
  document.getElementById('mMax').value = w.maxParticipants;
  const d = new Date(w.workoutDate);
  document.getElementById('mDate').value = d.toISOString().slice(0,16);
  await loadSelects();
  document.getElementById('mType').value = w.workoutTypeId;
  document.getElementById('mTrainer').value = w.userId;
  openModal('modal');
}

async function saveWorkout() {
  const id = document.getElementById('mId').value;
  // CreateWorkoutDto / UpdateWorkoutDto: { workoutTypeId, userId, workoutDate, maxParticipants }
  const body = {
    workoutTypeId: parseInt(document.getElementById('mType').value),
    userId: parseInt(document.getElementById('mTrainer').value),
    workoutDate: document.getElementById('mDate').value,
    maxParticipants: parseInt(document.getElementById('mMax').value)
  };
  const dateEl = document.getElementById('mDate');
  const maxEl  = document.getElementById('mMax');
  let ok = true;
  ok = Validate.check(dateEl, v => Validate.date(v, 'Дата тренировки'))         && ok;
  ok = Validate.check(maxEl,  v => Validate.positiveInt(v, 'Макс. участников')) && ok;
  if (!ok) return;
  try {
    if (id) await api.put('/Workouts/' + id, body);
    else await api.post('/Workouts', body);
    closeModal('modal');
    workoutTypes = []; trainers = []; // сбросить кэш
    loadWorkouts();
  } catch(e) { alert('Ошибка: ' + e.message); }
}


function showDeleteError(hint) {
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  box.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:28px;max-width:420px;width:100%">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:36px;height:36px;background:var(--red-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div style="font-family:Syne,sans-serif;font-size:16px;font-weight:700;color:var(--text)">Невозможно удалить</div>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6">${hint}</p>
    <button onclick="this.closest('[style*=position]').remove()" style="width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">Понятно</button>
  </div>`;
  document.body.appendChild(box);
}

function isConstraintError(msg) {
  return msg.includes('REFERENCE') || msg.includes('conflict') || msg.includes('FK_') || msg.includes('foreign key');
}

async function deleteWorkout(id) {
  if (!confirm('Удалить тренировку?')) return;
  try {
    await api.delete('/Workouts/' + id);
    loadWorkouts();
  } catch(e) {
    if (isConstraintError(e.message)) {
      showDeleteError('На эту тренировку есть записи клиентов. Сначала удалите все записи в разделе «Записи на тренировки».');
    } else {
      alert('Ошибка: ' + e.message);
    }
  }
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

loadWorkouts();
</script>
</body>
</html>
