<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Аналитика — Атлетика CRM</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .progress-bar-wrap { margin-bottom: 12px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; }
    .progress-label span:first-child { color: var(--text); font-weight: 500; }
    .progress-label span:last-child { color: var(--text-muted); }
    .progress-track { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .fin-stat { background: var(--surface2); border-radius: 10px; padding: 16px; }
    .fin-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .fin-stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
    .fin-stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  </style>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = '../login.html';
renderLayout('Аналитика', 'analytics');
</script>

<script>
if (!requireRole([1])) {} else {
  const content = document.getElementById('pageContent');
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Аналитика и финансы</div>
        <div class="page-sub">Финансовые показатели, посещаемость и эффективность работы клуба</div>
      </div>
      <button class="btn-outline" onclick="loadAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Обновить
      </button>
    </div>

    <!-- Главные показатели -->
    <div class="analytics-grid" id="kpiGrid">
      <div class="stat-card"><div class="stat-icon blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div><div class="stat-label">Клиентов</div><div class="stat-value" id="kpiClients">—</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div><div class="stat-label">Активных абонементов</div><div class="stat-value" id="kpiActive">—</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div><div class="stat-label">Выручка (всего)</div><div class="stat-value" id="kpiRevenue">—</div></div></div>
      <div class="stat-card"><div class="stat-icon purple"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="stat-label">Тренировок проведено</div><div class="stat-value" id="kpiWorkouts">—</div></div></div>
    </div>

    <!-- Финансы + Посещаемость -->
    <div class="fin-grid">
      <!-- Финансы по тарифам -->
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot" style="background:var(--yellow)"></span>Выручка по тарифам</div>
        </div>
        <div style="padding:20px" id="revenueByPlan">
          <div class="loading-row"><span class="spinner"></span> Загрузка</div>
        </div>
      </div>

      <!-- Посещаемость тренировок -->
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot" style="background:var(--green)"></span>Посещаемость по типам тренировок</div>
        </div>
        <div style="padding:20px" id="attendanceByType">
          <div class="loading-row"><span class="spinner"></span> Загрузка</div>
        </div>
      </div>
    </div>

    <!-- Эффективность тренеров + Последние абонементы -->
    <div class="fin-grid">
      <!-- Тренеры -->
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot" style="background:var(--accent)"></span>Эффективность тренеров</div>
        </div>
        <table class="fc-table">
          <thead><tr><th>Тренер</th><th>Тренировок</th><th>Записей</th><th>Посещений</th></tr></thead>
          <tbody id="trainerStats"><tr><td colspan="4"><div class="loading-row"><span class="spinner"></span></div></td></tr></tbody>
        </table>
      </div>

      <!-- Последние оформленные абонементы -->
      <div class="table-card">
        <div class="table-card-head">
          <div class="table-card-title"><span class="title-dot" style="background:var(--purple)"></span>Последние абонементы</div>
        </div>
        <table class="fc-table">
          <thead><tr><th>Клиент</th><th>Тариф</th><th>Сумма</th><th>Статус</th></tr></thead>
          <tbody id="lastMemberships"><tr><td colspan="4"><div class="loading-row"><span class="spinner"></span></div></td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Сводка по посещениям -->
    <div class="table-card" style="margin-top:0">
      <div class="table-card-head">
        <div class="table-card-title"><span class="title-dot" style="background:var(--green)"></span>Статистика посещений клиентов</div>
      </div>
      <table class="fc-table">
        <thead><tr><th>#</th><th>Клиент</th><th>Абонемент</th><th>Посещений использовано</th><th>Осталось</th><th>Действителен до</th><th>Статус</th></tr></thead>
        <tbody id="visitStats"><tr><td colspan="7"><div class="loading-row"><span class="spinner"></span></div></td></tr></tbody>
      </table>
    </div>
  `;

  loadAll();
}

async function loadAll() {
  try {
    const [users, workouts, memberships, plans, regs, wTypes] = await Promise.all([
      api.get('/Users'),
      api.get('/Workouts'),
      api.get('/ClientMemberships'),
      api.get('/MembershipPlans'),
      api.get('/WorkoutRegistrations'),
      api.get('/WorkoutTypes')
    ]);

    const clients  = users.filter(u => u.roleId === 3);
    const trainers = users.filter(u => u.roleId === 2);
    const activeMemberships = memberships.filter(m => m.isActive);

    // Выручка = сумма цен планов по всем оформленным абонементам
    const planPriceMap = {};
    plans.forEach(p => planPriceMap[p.id] = p.price);
    const totalRevenue = memberships.reduce((sum, m) => sum + (planPriceMap[m.membershipPlanId] || 0), 0);

    // Прошедшие тренировки
    const pastWorkouts = workouts.filter(w => new Date(w.workoutDate) < new Date());

    // KPI
    document.getElementById('kpiClients').textContent   = clients.length;
    document.getElementById('kpiActive').textContent    = activeMemberships.length;
    document.getElementById('kpiRevenue').textContent   = formatMoney(totalRevenue);
    document.getElementById('kpiWorkouts').textContent  = pastWorkouts.length;

    // Выручка по тарифам
    const revenueByPlan = {};
    memberships.forEach(m => {
      const plan = plans.find(p => p.id === m.membershipPlanId);
      if (!plan) return;
      if (!revenueByPlan[plan.planName]) revenueByPlan[plan.planName] = { count: 0, revenue: 0, price: plan.price };
      revenueByPlan[plan.planName].count++;
      revenueByPlan[plan.planName].revenue += plan.price;
    });

    const maxRevenue = Math.max(...Object.values(revenueByPlan).map(v => v.revenue), 1);
    const colors = ['var(--accent)', 'var(--green)', 'var(--yellow)', 'var(--purple)', 'var(--red)'];
    let i = 0;

    document.getElementById('revenueByPlan').innerHTML = Object.keys(revenueByPlan).length
      ? Object.entries(revenueByPlan).sort((a,b) => b[1].revenue - a[1].revenue).map(([name, data]) => {
          const color = colors[i++ % colors.length];
          const pct = Math.round((data.revenue / maxRevenue) * 100);
          return `<div class="progress-bar-wrap">
            <div class="progress-label">
              <span>${name}</span>
              <span>${data.count} абон. · ${formatMoney(data.revenue)}</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
          </div>`;
        }).join('') + `<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px">
          <span style="color:var(--text-muted)">Итого выручка</span>
          <span style="font-weight:700;color:var(--yellow)">${formatMoney(totalRevenue)}</span>
        </div>`
      : '<div class="empty-state"><p>Нет данных</p></div>';

    // Посещаемость по типам тренировок
    const attendanceMap = {};
    regs.forEach(r => {
      const name = r.workoutTypeName || 'Без типа';
      if (!attendanceMap[name]) attendanceMap[name] = { total: 0, attended: 0 };
      attendanceMap[name].total++;
      if (r.attendanceMarked) attendanceMap[name].attended++;
    });

    const maxAtt = Math.max(...Object.values(attendanceMap).map(v => v.total), 1);
    i = 0;
    document.getElementById('attendanceByType').innerHTML = Object.keys(attendanceMap).length
      ? Object.entries(attendanceMap).sort((a,b) => b[1].total - a[1].total).map(([name, data]) => {
          const color = colors[i++ % colors.length];
          const pct = Math.round((data.total / maxAtt) * 100);
          const attPct = data.total > 0 ? Math.round((data.attended / data.total) * 100) : 0;
          return `<div class="progress-bar-wrap">
            <div class="progress-label">
              <span>${name}</span>
              <span>${data.attended}/${data.total} посетили (${attPct}%)</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
          </div>`;
        }).join('')
      : '<div class="empty-state"><p>Нет данных о записях</p></div>';

    // Эффективность тренеров
    const trainerMap = {};
    trainers.forEach(t => { trainerMap[t.id] = { name: t.fullName, workouts: 0, regs: 0, attended: 0 }; });
    workouts.forEach(w => { if (trainerMap[w.userId]) trainerMap[w.userId].workouts++; });
    regs.forEach(r => {
      const w = workouts.find(x => x.id === r.workoutId);
      if (w && trainerMap[w.userId]) {
        trainerMap[w.userId].regs++;
        if (r.attendanceMarked) trainerMap[w.userId].attended++;
      }
    });

    document.getElementById('trainerStats').innerHTML = Object.values(trainerMap).length
      ? Object.values(trainerMap).sort((a,b) => b.workouts - a.workouts).map(t => `
          <tr>
            <td><strong>${t.name}</strong></td>
            <td><span class="badge badge-blue">${t.workouts}</span></td>
            <td class="muted">${t.regs}</td>
            <td><span class="badge badge-green">${t.attended}</span></td>
          </tr>`).join('')
      : `<tr><td colspan="4"><div class="empty-state"><p>Нет тренеров</p></div></td></tr>`;

    // Последние абонементы (10 штук)
    const sorted = [...memberships].sort((a,b) => new Date(b.purchaseDate) - new Date(a.purchaseDate)).slice(0,10);
    document.getElementById('lastMemberships').innerHTML = sorted.length
      ? sorted.map(m => {
          const price = planPriceMap[m.membershipPlanId] || 0;
          return `<tr>
            <td><strong>${m.clientName || '—'}</strong></td>
            <td class="muted">${m.planName || '—'}</td>
            <td><span class="badge badge-yellow">${formatMoney(price)}</span></td>
            <td><span class="badge ${m.isActive ? 'badge-green' : 'badge-red'}">${m.isActive ? 'Активен' : 'Истёк'}</span></td>
          </tr>`;
        }).join('')
      : `<tr><td colspan="4"><div class="empty-state"><p>Нет абонементов</p></div></td></tr>`;

    // Статистика посещений клиентов
    document.getElementById('visitStats').innerHTML = memberships.length
      ? memberships.sort((a,b) => b.visitsUsed - a.visitsUsed).map((m, idx) => {
          const left = m.allowedVisits - m.visitsUsed;
          return `<tr>
            <td class="muted">${idx+1}</td>
            <td><strong>${m.clientName || '—'}</strong></td>
            <td class="muted">${m.planName || '—'}</td>
            <td><span class="badge badge-blue">${m.visitsUsed} из ${m.allowedVisits}</span></td>
            <td class="muted">${left > 0 ? left : '<span style="color:var(--red)">0</span>'}</td>
            <td class="muted">${fmtDate(m.expiryDate)}</td>
            <td><span class="badge ${m.isActive ? 'badge-green' : 'badge-red'}">${m.isActive ? 'Активен' : 'Истёк'}</span></td>
          </tr>`;
        }).join('')
      : `<tr><td colspan="7"><div class="empty-state"><p>Нет данных</p></div></td></tr>`;

  } catch(e) {
    console.error(e);
    document.getElementById('kpiClients').textContent = '—';
    document.getElementById('kpiActive').textContent  = '—';
    document.getElementById('kpiRevenue').textContent = '—';
    document.getElementById('kpiWorkouts').textContent= '—';
  }
}

function formatMoney(v) {
  return Number(v).toLocaleString('ru-RU') + ' ₽';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU');
}
</script>
</body>
</html>
