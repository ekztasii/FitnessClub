<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Записи на тренировки — Атлетика CRM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
renderLayout('Записи на тренировки', 'registrations');

document.getElementById('pageContent').innerHTML = `
  <div class="section-card">
    <div class="section-card-header">
      <h5>✅ Записи на тренировки</h5>
      <div class="search-box me-2">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Поиск по клиенту...">
      </div>
      <button class="btn-primary-fc" onclick="openModal()">+ Записать клиента</button>
    </div>
    <div class="section-card-body">
      <table class="fc-table">
        <thead><tr><th>#</th><th>Клиент</th><th>Тренировка</th><th>Дата записи</th><th>Посещение</th><th>Действия</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6"><div class="fc-loader"><div class="spinner"></div>Загрузка...</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="crudModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Записать клиента на тренировку</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Клиент *</label>
            <select class="form-select" id="fClient"><option value="">Загрузка...</option></select></div>
          <div class="mb-3"><label class="form-label">Тренировка *</label>
            <select class="form-select" id="fWorkout"><option value="">Загрузка...</option></select></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
          <button class="btn-primary-fc" id="saveBtn" onclick="saveItem()">💾 Записать</button>
        </div>
      </div>
    </div>
  </div>
`;

let allItems = [], allClients = [], allWorkouts = [];

async function loadData() {
  try {
    [allItems, allClients, allWorkouts] = await Promise.all([
      api.get('/workoutregistrations'),
      api.get('/users/by-role/3'),
      api.get('/workouts/upcoming')
    ]);
    document.getElementById('fClient').innerHTML  = allClients.map(c => `<option value="${c.id}">${c.fullName}</option>`).join('');
    document.getElementById('fWorkout').innerHTML = allWorkouts.map(w => {
      const d = new Date(w.workoutDate).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<option value="${w.id}">${w.workoutTypeName} — ${d} (${w.currentParticipants}/${w.maxParticipants})</option>`;
    }).join('');
    renderTable(allItems);
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Ошибка загрузки</p></div></td></tr>`;
  }
}

function renderTable(items) {
  const tbody = document.getElementById('tableBody');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">✅</div><p>Записей не найдено</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = items.map((r,i) => {
    const regDate = new Date(r.registrationDate).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});
    const wDate   = new Date(r.workoutDate).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `<tr>
      <td class="text-muted">${i+1}</td>
      <td><strong>${r.clientName}</strong></td>
      <td>${r.workoutTypeName} <span class="text-muted" style="font-size:.8rem">${wDate}</span></td>
      <td>${regDate}</td>
      <td>
        <button onclick="toggleAttendance(${r.id}, ${r.attendanceMarked})"
          class="fc-badge ${r.attendanceMarked ? 'active' : 'inactive'}" style="cursor:pointer;border:none">
          ${r.attendanceMarked ? '✓ Был(а)' : '✗ Не был(а)'}
        </button>
      </td>
      <td><button class="btn-icon del" onclick="deleteItem(${r.id}, '${r.clientName}')">🗑️</button></td>
    </tr>`;
  }).join('');
}

function openModal() {
  new bootstrap.Modal(document.getElementById('crudModal')).show();
}

async function saveItem() {
  const workoutId = +document.getElementById('fWorkout').value;
  const userId    = +document.getElementById('fClient').value;
  if (!workoutId || !userId) { showToast('Выберите клиента и тренировку','warning'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳...'; btn.disabled = true;
  try {
    await api.post('/workoutregistrations', { workoutId, userId });
    showToast('Клиент записан на тренировку');
    bootstrap.Modal.getInstance(document.getElementById('crudModal')).hide();
    loadData();
  } catch(e) {
    const msg = e.status === 409 ? 'Клиент уже записан на эту тренировку' : 'Ошибка записи';
    showToast(msg, 'danger');
  } finally { btn.textContent = '💾 Записать'; btn.disabled = false; }
}

async function toggleAttendance(id, current) {
  try {
    await api.patch(`/workoutregistrations/${id}/attendance`, { attendanceMarked: !current });
    showToast(!current ? 'Посещение отмечено' : 'Отметка снята');
    loadData();
  } catch(e) { showToast('Ошибка','danger'); }
}

function deleteItem(id, name) {
  confirmDelete(`Отменить запись клиента «${name}»?`, async () => {
    try { await api.delete(`/workoutregistrations/${id}`); showToast('Запись отменена'); loadData(); }
    catch(e) { showToast('Ошибка удаления','danger'); }
  });
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderTable(allItems.filter(r => r.clientName.toLowerCase().includes(e.target.value.toLowerCase())));
});

loadData();
</script>
</body>
</html>
