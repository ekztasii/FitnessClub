<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Планы абонементов — Атлетика CRM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>if (!localStorage.getItem("fc_user")) { window.location.href = "../login.html"; }</script>
<script>
renderLayout('Планы абонементов', 'plans');

document.getElementById('pageContent').innerHTML = `
  <div class="section-card">
    <div class="section-card-header">
      <h5>💳 Планы абонементов</h5>
      <button class="btn-primary-fc" onclick="openModal()">+ Добавить план</button>
    </div>
    <div class="section-card-body">
      <table class="fc-table">
        <thead><tr><th>#</th><th>Название</th><th>Цена</th><th>Срок (дней)</th><th>Посещений</th><th>Действия</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6"><div class="fc-loader"><div class="spinner"></div>Загрузка...</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="crudModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Добавить план</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Название *</label>
            <input type="text" class="form-control" id="fName" placeholder='Например: "Месячный базовый"'></div>
          <div class="row g-2">
            <div class="col-6 mb-3"><label class="form-label">Цена (руб.) *</label>
              <input type="number" class="form-control" id="fPrice" placeholder="2500" min="0"></div>
            <div class="col-6 mb-3"><label class="form-label">Срок действия (дней) *</label>
              <input type="number" class="form-control" id="fDays" placeholder="30" min="1"></div>
          </div>
          <div class="mb-3"><label class="form-label">Кол-во посещений *</label>
            <input type="number" class="form-control" id="fVisits" placeholder="12" min="1"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
          <button class="btn-primary-fc" id="saveBtn" onclick="saveItem()">💾 Сохранить</button>
        </div>
      </div>
    </div>
  </div>
`;

let allItems = [], editingId = null;

async function loadData() {
  try {
    allItems = await api.get('/membershipplans');
    renderTable(allItems);
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Ошибка загрузки</p></div></td></tr>`;
  }
}

function renderTable(items) {
  const tbody = document.getElementById('tableBody');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">💳</div><p>Планы не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = items.map((p,i) => `<tr>
    <td class="text-muted">${i+1}</td>
    <td><strong>${p.planName}</strong></td>
    <td><span class="fw-bold" style="color:var(--success)">${Number(p.price).toLocaleString('ru-RU')} ₽</span></td>
    <td>${p.validityDays} дн.</td>
    <td>${p.allowedVisits} посещ.</td>
    <td>
      <button class="btn-icon edit me-1" onclick="openModal(${p.id})">✏️</button>
      <button class="btn-icon del" onclick="deleteItem(${p.id},'${p.planName}')">🗑️</button>
    </td>
  </tr>`).join('');
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Редактировать план' : 'Добавить план';
  if (id) {
    const p = allItems.find(x => x.id === id);
    document.getElementById('fName').value   = p.planName;
    document.getElementById('fPrice').value  = p.price;
    document.getElementById('fDays').value   = p.validityDays;
    document.getElementById('fVisits').value = p.allowedVisits;
  } else {
    ['fName','fPrice','fDays','fVisits'].forEach(f => document.getElementById(f).value = '');
  }
  new bootstrap.Modal(document.getElementById('crudModal')).show();
}

async function saveItem() {
  const planName     = document.getElementById('fName').value.trim();
  const price        = +document.getElementById('fPrice').value;
  const validityDays = +document.getElementById('fDays').value;
  const allowedVisits = +document.getElementById('fVisits').value;
  if (!planName || !price || !validityDays || !allowedVisits) { showToast('Заполните все поля','warning'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳...'; btn.disabled = true;
  try {
    if (editingId) { await api.put(`/membershipplans/${editingId}`, { planName, price, validityDays, allowedVisits }); showToast('План обновлён'); }
    else { await api.post('/membershipplans', { planName, price, validityDays, allowedVisits }); showToast('План добавлен'); }
    bootstrap.Modal.getInstance(document.getElementById('crudModal')).hide();
    loadData();
  } catch(e) { showToast('Ошибка сохранения','danger'); }
  finally { btn.textContent = '💾 Сохранить'; btn.disabled = false; }
}

function deleteItem(id, name) {
  confirmDelete(`Удалить план «${name}»?`, async () => {
    try { await api.delete(`/membershipplans/${id}`); showToast('План удалён'); loadData(); }
    catch(e) { showToast('Ошибка удаления','danger'); }
  });
}

loadData();
</script>
</body>
</html>
