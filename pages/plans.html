<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Планы абонементов — Атлетика CRM</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = '../login.html';
renderLayout('Планы абонементов', 'plans');
</script>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Добавить план</div>
    <input type="hidden" id="mId"/>
    <div class="form-group"><label class="form-label">Название</label><input type="text" class="form-control" id="mName" placeholder="Например: Месячный стандарт"/></div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Цена (руб.)</label><input type="number" class="form-control" id="mPrice" placeholder="2500" min="0"/></div>
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Дней действия</label><input type="number" class="form-control" id="mDays" placeholder="30" min="1"/></div>
    </div>
    <div class="form-group" style="margin-top:16px"><label class="form-label">Разрешено посещений</label><input type="number" class="form-control" id="mVisits" placeholder="12" min="1"/></div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('modal')">Отмена</button>
      <button class="btn-modal-save" onclick="savePlan()">Сохранить</button>
    </div>
  </div>
</div>

<script>
if (!requireRole([1])) {} else {
  const content = document.getElementById('pageContent');
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Планы абонементов</div>
        <div class="page-sub">Тарифы и условия посещения</div>
      </div>
      <button class="btn-add" onclick="openAdd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить план
      </button>
    </div>
    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title"><span class="title-dot" style="background:var(--yellow)"></span>Все тарифные планы</div>
      </div>
      <table class="fc-table">
        <thead><tr><th>#</th><th>Название</th><th>Цена</th><th>Дней</th><th>Посещений</th><th>Действия</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="6"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
      </table>
    </div>
  `;
  loadPlans();
}

let allPlans = [];

async function loadPlans() {
  try {
    allPlans = await api.get('/MembershipPlans');
    renderTable();
  } catch(e) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--red);padding:24px">Ошибка загрузки</td></tr>`;
  }
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  if (!allPlans.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/></svg></div><p>Планы не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = allPlans.map((p, i) => `
    <tr>
      <td class="muted">${i + 1}</td>
      <td><strong>${p.planName}</strong></td>
      <td><span class="badge badge-yellow">${Number(p.price).toLocaleString('ru-RU')} ₽</span></td>
      <td class="muted">${p.validityDays} дн.</td>
      <td class="muted">${p.allowedVisits} посещ.</td>
      <td>
        <button class="btn-icon" onclick='openEdit(${JSON.stringify(p)})' title="Редактировать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon danger" onclick="deletePlan(${p.id})" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </td>
    </tr>
  `).join('');
}

function openAdd() {
  document.getElementById('modalTitle').textContent = 'Добавить план';
  ['mId','mName','mPrice','mDays','mVisits'].forEach(id => document.getElementById(id).value = '');
  openModal('modal');
}

function openEdit(p) {
  document.getElementById('modalTitle').textContent = 'Редактировать план';
  document.getElementById('mId').value = p.id;
  document.getElementById('mName').value = p.planName;
  document.getElementById('mPrice').value = p.price;
  document.getElementById('mDays').value = p.validityDays;
  document.getElementById('mVisits').value = p.allowedVisits;
  openModal('modal');
}

async function savePlan() {
  const id = document.getElementById('mId').value;
  const body = {
    planName: document.getElementById('mName').value.trim(),
    price: parseFloat(document.getElementById('mPrice').value),
    validityDays: parseInt(document.getElementById('mDays').value),
    allowedVisits: parseInt(document.getElementById('mVisits').value)
  };
  if (!body.planName || isNaN(body.price)) { alert('Заполните все поля'); return; }
  try {
    if (id) await api.put('/MembershipPlans/' + id, body);
    else await api.post('/MembershipPlans', body);
    closeModal('modal');
    loadPlans();
  } catch(e) { alert('Ошибка: ' + e.message); }
}


function showDeleteError(hint) {
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  box.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:28px;max-width:420px;width:100%">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:36px;height:36px;background:var(--red-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div style="font-family:Syne,sans-serif;font-size:16px;font-weight:700;color:var(--text)">Невозможно удалить</div>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6">${hint}</p>
    <button onclick="this.closest('[style*=position]').remove()" style="width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">Понятно</button>
  </div>`;
  document.body.appendChild(box);
}

function isConstraintError(msg) {
  return msg.includes('REFERENCE') || msg.includes('conflict') || msg.includes('FK_') || msg.includes('foreign key');
}

async function deletePlan(id) {
  if (!confirm('Удалить план абонемента?')) return;
  try {
    await api.delete('/MembershipPlans/' + id);
    loadPlans();
  } catch(e) {
    if (isConstraintError(e.message)) {
      showDeleteError('К этому тарифу привязаны абонементы клиентов. Сначала удалите все абонементы с этим тарифом в разделе «Абонементы».');
    } else {
      alert('Ошибка: ' + e.message);
    }
  }
}
</script>
</body>
</html>
