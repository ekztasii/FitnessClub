<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Абонементы — Атлетика CRM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>if (!localStorage.getItem("fc_user")) { window.location.href = "../login.html"; }</script>
<script>
renderLayout('Абонементы клиентов', 'memberships');

document.getElementById('pageContent').innerHTML = `
  <div class="d-flex gap-2 mb-3 flex-wrap">
    <button class="btn-primary-fc" onclick="openModal()">+ Оформить абонемент</button>
    <button class="btn btn-outline-secondary btn-sm" onclick="loadAll()">Все</button>
    <button class="btn btn-outline-success btn-sm" onclick="loadActive()">✅ Активные</button>
  </div>
  <div class="section-card">
    <div class="section-card-header">
      <h5 id="tableTitle">🎫 Все абонементы</h5>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Поиск по клиенту...">
      </div>
    </div>
    <div class="section-card-body">
      <table class="fc-table">
        <thead><tr><th>#</th><th>Клиент</th><th>Тариф</th><th>Куплен</th><th>Действует до</th><th>Посещений</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="8"><div class="fc-loader"><div class="spinner"></div>Загрузка...</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="crudModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Оформить абонемент</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Клиент *</label>
            <select class="form-select" id="fClient"><option value="">Загрузка...</option></select></div>
          <div class="mb-3"><label class="form-label">Тарифный план *</label>
            <select class="form-select" id="fPlan"><option value="">Загрузка...</option></select></div>
          <div class="mb-3"><label class="form-label">Дата покупки *</label>
            <input type="date" class="form-control" id="fDate"></div>
          <div class="alert alert-info py-2 px-3" style="font-size:.82rem">
            💡 Дата окончания рассчитывается автоматически на основе тарифного плана
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
          <button class="btn-primary-fc" id="saveBtn" onclick="saveItem()">💾 Оформить</button>
        </div>
      </div>
    </div>
  </div>
`;

let allItems = [], allClients = [], allPlans = [];

async function loadAll() {
  document.getElementById('tableTitle').textContent = '🎫 Все абонементы';
  try { allItems = await api.get('/clientmemberships'); renderTable(allItems); }
  catch(e) { showToast('Ошибка загрузки','danger'); }
}

async function loadActive() {
  document.getElementById('tableTitle').textContent = '✅ Активные абонементы';
  try { allItems = await api.get('/clientmemberships/active'); renderTable(allItems); }
  catch(e) { showToast('Ошибка загрузки','danger'); }
}

function renderTable(items) {
  const tbody = document.getElementById('tableBody');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🎫</div><p>Абонементы не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = items.map((m,i) => {
    const visitsLeft = m.allowedVisits - m.visitsUsed;
    const pct = m.allowedVisits > 0 ? Math.round(m.visitsUsed / m.allowedVisits * 100) : 0;
    return `<tr>
      <td class="text-muted">${i+1}</td>
      <td><strong>${m.clientName}</strong></td>
      <td>${m.planName}</td>
      <td>${m.purchaseDate}</td>
      <td>${m.expiryDate}</td>
      <td>
        <div class="d-flex align-items-center gap-2">
          <span style="font-size:.82rem">${m.visitsUsed}/${m.allowedVisits}</span>
          <div style="width:50px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${pct>=100?'var(--danger)':pct>=70?'var(--accent)':'var(--success)'}"></div>
          </div>
        </div>
      </td>
      <td><span class="fc-badge ${m.isActive ? 'active' : 'inactive'}">${m.isActive ? 'Активен' : 'Истёк'}</span></td>
      <td class="d-flex gap-1">
        ${m.isActive ? `<button class="btn-icon view" title="Списать посещение" onclick="incrementVisit(${m.id})">➕</button>` : ''}
        <button class="btn-icon del" onclick="deleteItem(${m.id},'${m.clientName}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

async function init() {
  try {
    [allClients, allPlans, allItems] = await Promise.all([
      api.get('/users/by-role/3'),
      api.get('/membershipplans'),
      api.get('/clientmemberships')
    ]);
    document.getElementById('fClient').innerHTML = allClients.map(c => `<option value="${c.id}">${c.fullName}</option>`).join('');
    document.getElementById('fPlan').innerHTML   = allPlans.map(p => `<option value="${p.id}">${p.planName} — ${Number(p.price).toLocaleString('ru-RU')} ₽ / ${p.validityDays} дн.</option>`).join('');
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fDate').value = today;
    renderTable(allItems);
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Ошибка загрузки</p></div></td></tr>`;
  }
}

function openModal() {
  new bootstrap.Modal(document.getElementById('crudModal')).show();
}

async function saveItem() {
  const userId = +document.getElementById('fClient').value;
  const membershipPlanId = +document.getElementById('fPlan').value;
  const purchaseDate = document.getElementById('fDate').value;
  if (!userId || !membershipPlanId || !purchaseDate) { showToast('Заполните все поля','warning'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳...'; btn.disabled = true;
  try {
    await api.post('/clientmemberships', { userId, membershipPlanId, purchaseDate });
    showToast('Абонемент оформлен');
    bootstrap.Modal.getInstance(document.getElementById('crudModal')).hide();
    init();
  } catch(e) { showToast('Ошибка оформления','danger'); }
  finally { btn.textContent = '💾 Оформить'; btn.disabled = false; }
}

async function incrementVisit(id) {
  try {
    await api.patch(`/clientmemberships/${id}/increment-visit`, {});
    showToast('Посещение списано');
    init();
  } catch(e) {
    const text = await e.text?.() || '';
    showToast(text || 'Ошибка списания', 'danger');
  }
}

function deleteItem(id, name) {
  confirmDelete(`Удалить абонемент клиента «${name}»?`, async () => {
    try { await api.delete(`/clientmemberships/${id}`); showToast('Абонемент удалён'); init(); }
    catch(e) { showToast('Ошибка удаления','danger'); }
  });
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderTable(allItems.filter(m => m.clientName.toLowerCase().includes(e.target.value.toLowerCase())));
});

init();
</script>
</body>
</html>
