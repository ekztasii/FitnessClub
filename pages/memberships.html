<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Абонементы — Атлетика CRM</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
if (!localStorage.getItem('fc_user')) window.location.href = '../login.html';
renderLayout(isClient() ? 'Мой абонемент' : 'Абонементы', 'memberships');
</script>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">Оформить абонемент</div>
    <div class="form-group" id="clientGroup"><label class="form-label">Клиент</label><select class="form-control" id="mClient"></select></div>
    <div class="form-group"><label class="form-label">Тариф</label><select class="form-control" id="mPlan"></select></div>
    <div class="form-group"><label class="form-label">Дата начала</label><input type="date" class="form-control" id="mDate"/></div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('modal')">Отмена</button>
      <button class="btn-modal-save" onclick="saveMembership()">Оформить</button>
    </div>
  </div>
</div>

<script>
const user = getCurrentUser();
const content = document.getElementById('pageContent');

content.innerHTML = `
  <div class="page-header">
    <div>
      <div class="page-title">${isClient() ? 'Мой абонемент' : 'Абонементы'}</div>
      <div class="page-sub">${isClient() ? 'Информация о вашем абонементе' : 'Управление абонементами клиентов'}</div>
    </div>
    ${isAdmin() ? `<button class="btn-add" onclick="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Оформить абонемент
    </button>` : ''}
  </div>
  <div class="table-card">
    <div class="table-card-head">
      <div class="table-card-title"><span class="title-dot" style="background:var(--purple)"></span>${isClient() ? 'Мои абонементы' : 'Все абонементы'}</div>
    </div>
    <table class="fc-table">
      <thead><tr><th>#</th><th>Клиент</th><th>Тариф</th><th>Дата начала</th><th>Действует до</th><th>Посещения</th><th>Статус</th>${isAdmin() ? '<th>Действия</th>' : ''}</tr></thead>
      <tbody id="tbody"><tr><td colspan="${isAdmin() ? 8 : 7}"><div class="loading-row"><span class="spinner"></span> Загрузка</div></td></tr></tbody>
    </table>
  </div>
`;

async function loadMemberships() {
  try {
    let all = await api.get('/clientmemberships');
    if (isClient()) all = all.filter(m => m.userId === user.id || m.clientId === user.id);
    renderTable(all);
  } catch(e) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--red);padding:24px">Ошибка загрузки</td></tr>`;
  }
}

function renderTable(list) {
  const cols = isAdmin() ? 8 : 7;
  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><p>Абонементы не найдены</p></div></td></tr>`;
    return;
  }
  const now = new Date();
  tbody.innerHTML = list.map((m, i) => {
    const exp = new Date(m.expiryDate);
    const active = exp > now;
    return `<tr>
      <td class="muted">${i + 1}</td>
      <td><strong>${m.clientName || m.userName || '—'}</strong></td>
      <td>${m.planName || '—'}</td>
      <td class="muted">${fmtDate(m.purchaseDate)}</td>
      <td class="muted">${fmtDate(m.expiryDate)}</td>
      <td><span class="badge badge-blue">${m.visitsUsed ?? 0} / ${m.allowedVisits ?? '∞'}</span></td>
      <td><span class="badge ${active ? 'badge-green' : 'badge-red'}">${active ? 'Активен' : 'Истёк'}</span></td>
      ${isAdmin() ? `<td>
        ${active ? `<button class="btn-icon" onclick="addVisit(${m.id})" title="Добавить посещение" style="color:var(--green)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>` : ''}
        <button class="btn-icon danger" onclick="deleteMembership(${m.id})" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </td>` : ''}
    </tr>`;
  }).join('');
}

async function openAdd() {
  const all = await api.get('/users');
  const clients = all.filter(u => u.roleId === 3);
  document.getElementById('mClient').innerHTML = clients.map(c => `<option value="${c.id}">${c.fullName}</option>`).join('');
  const plans = await api.get('/membershipplans');
  document.getElementById('mPlan').innerHTML = plans.map(p => `<option value="${p.id}">${p.planName} — ${p.price} руб.</option>`).join('');
  document.getElementById('mDate').value = new Date().toISOString().split('T')[0];
  openModal('modal');
}

async function saveMembership() {
  const body = {
    userId: parseInt(document.getElementById('mClient').value),
    membershipPlanId: parseInt(document.getElementById('mPlan').value),
    purchaseDate: document.getElementById('mDate').value,
    visitsUsed: 0
  };
  try {
    await api.post('/clientmemberships', body);
    closeModal('modal');
    loadMemberships();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function addVisit(id) {
  try { await api.patch('/clientmemberships/' + id + '/increment-visit'); loadMemberships(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}

async function deleteMembership(id) {
  if (!confirm('Удалить абонемент?')) return;
  try { await api.delete('/clientmemberships/' + id); loadMemberships(); }
  catch(e) { alert('Ошибка: ' + e.message); }
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU');
}

loadMemberships();
</script>
</body>
</html>
