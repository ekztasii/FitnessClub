<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Типы тренировок — Атлетика CRM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>if (!localStorage.getItem("fc_user")) { window.location.href = "../login.html"; }</script>
<script>
renderLayout('Типы тренировок', 'workout-types');

document.getElementById('pageContent').innerHTML = `
  <div class="section-card">
    <div class="section-card-header">
      <h5>📋 Типы тренировок</h5>
      <button class="btn-primary-fc" onclick="openModal()">+ Добавить тип</button>
    </div>
    <div class="section-card-body">
      <table class="fc-table">
        <thead><tr><th>#</th><th>Название</th><th>Уровень</th><th>Тренер</th><th>Описание</th><th>Действия</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6"><div class="fc-loader"><div class="spinner"></div>Загрузка...</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="crudModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Добавить тип</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Название *</label>
            <input type="text" class="form-control" id="fName" placeholder="Йога, Кроссфит, Пилатес..."></div>
          <div class="mb-3"><label class="form-label">Уровень сложности</label>
            <select class="form-select" id="fLvl">
              <option value="">— Не указан —</option>
              <option value="1">1 — Начинающий</option>
              <option value="2">2 — Средний</option>
              <option value="3">3 — Продвинутый</option>
            </select></div>
          <div class="mb-3"><label class="form-label">Тренер *</label>
            <select class="form-select" id="fTrainer"><option value="">Загрузка...</option></select></div>
          <div class="mb-3"><label class="form-label">Описание</label>
            <textarea class="form-control" id="fDesc" rows="2" placeholder="Краткое описание..."></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
          <button class="btn-primary-fc" id="saveBtn" onclick="saveItem()">💾 Сохранить</button>
        </div>
      </div>
    </div>
  </div>
`;

let allTypes = [], allTrainers = [], editingId = null;

async function loadData() {
  try {
    [allTypes, allTrainers] = await Promise.all([api.get('/workouttypes'), api.get('/users/by-role/2')]);
    document.getElementById('fTrainer').innerHTML =
      allTrainers.map(t => `<option value="${t.id}">${t.fullName}</option>`).join('');
    renderTable(allTypes);
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Ошибка загрузки</p></div></td></tr>`;
  }
}

const lvlMap = { 1:'Начинающий', 2:'Средний', 3:'Продвинутый' };

function renderTable(items) {
  const tbody = document.getElementById('tableBody');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📋</div><p>Типы не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = items.map((t,i) => `<tr>
    <td class="text-muted">${i+1}</td>
    <td><strong>${t.typeName}</strong></td>
    <td>${t.workoutTypeLvl ? `<span class="fc-badge client">Ур. ${t.workoutTypeLvl} — ${lvlMap[t.workoutTypeLvl]}</span>` : '<span class="text-muted">—</span>'}</td>
    <td>${t.trainerName}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description || '<span class="text-muted">—</span>'}</td>
    <td>
      <button class="btn-icon edit me-1" onclick="openModal(${t.id})">✏️</button>
      <button class="btn-icon del" onclick="deleteItem(${t.id},'${t.typeName}')">🗑️</button>
    </td>
  </tr>`).join('');
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Редактировать тип' : 'Добавить тип';
  if (id) {
    const t = allTypes.find(x => x.id === id);
    document.getElementById('fName').value    = t.typeName;
    document.getElementById('fLvl').value     = t.workoutTypeLvl || '';
    document.getElementById('fTrainer').value = t.userId;
    document.getElementById('fDesc').value    = t.description || '';
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fLvl').value  = '';
    document.getElementById('fDesc').value = '';
  }
  new bootstrap.Modal(document.getElementById('crudModal')).show();
}

async function saveItem() {
  const typeName = document.getElementById('fName').value.trim();
  const userId   = +document.getElementById('fTrainer').value;
  if (!typeName || !userId) { showToast('Заполните обязательные поля','warning'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳...'; btn.disabled = true;
  const body = { typeName, userId, workoutTypeLvl: document.getElementById('fLvl').value ? +document.getElementById('fLvl').value : null, description: document.getElementById('fDesc').value || null };
  try {
    if (editingId) { await api.put(`/workouttypes/${editingId}`, body); showToast('Тип обновлён'); }
    else { await api.post('/workouttypes', body); showToast('Тип добавлен'); }
    bootstrap.Modal.getInstance(document.getElementById('crudModal')).hide();
    loadData();
  } catch(e) { showToast('Ошибка сохранения','danger'); }
  finally { btn.textContent = '💾 Сохранить'; btn.disabled = false; }
}

function deleteItem(id, name) {
  confirmDelete(`Удалить тип «${name}»?`, async () => {
    try { await api.delete(`/workouttypes/${id}`); showToast('Тип удалён'); loadData(); }
    catch(e) { showToast('Ошибка удаления','danger'); }
  });
}

loadData();
</script>
</body>
</html>
