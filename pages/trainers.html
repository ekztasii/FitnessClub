<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тренеры — Атлетика CRM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
renderLayout('Тренеры', 'trainers');

document.getElementById('pageContent').innerHTML = `
  <div class="section-card">
    <div class="section-card-header">
      <h5>💪 Список тренеров</h5>
      <div class="search-box me-2">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Поиск...">
      </div>
      <button class="btn-primary-fc" onclick="openModal()">+ Добавить тренера</button>
    </div>
    <div class="section-card-body">
      <table class="fc-table">
        <thead><tr><th>#</th><th>ФИО</th><th>Телефон</th><th>Email</th><th>Тренировок</th><th>Действия</th></tr></thead>
        <tbody id="tableBody">
          <tr><td colspan="6"><div class="fc-loader"><div class="spinner"></div>Загрузка...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="crudModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Добавить тренера</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">ФИО *</label>
            <input type="text" class="form-control" id="fFullName" placeholder="Петров Пётр Петрович"></div>
          <div class="mb-3"><label class="form-label">Телефон</label>
            <input type="text" class="form-control" id="fPhone" placeholder="+7 999 000 00 00"></div>
          <div class="mb-3"><label class="form-label">Email</label>
            <input type="email" class="form-control" id="fEmail"></div>
          <div id="passwordGroup"><div class="mb-3"><label class="form-label">Пароль *</label>
            <input type="password" class="form-control" id="fPassword"></div></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
          <button class="btn-primary-fc" id="saveBtn" onclick="saveTrainer()">💾 Сохранить</button>
        </div>
      </div>
    </div>
  </div>
`;

let allTrainers = [];
let allWorkouts = [];
let editingId = null;

async function loadData() {
  try {
    const [users, workouts] = await Promise.all([api.get('/users/by-role/2'), api.get('/workouts')]);
    allTrainers = users;
    allWorkouts = workouts;
    renderTable(allTrainers);
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Ошибка загрузки</p></div></td></tr>`;
  }
}

function renderTable(trainers) {
  const tbody = document.getElementById('tableBody');
  if (!trainers.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">💪</div><p>Тренеры не найдены</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = trainers.map((t, i) => {
    const count = allWorkouts.filter(w => w.userId === t.id).length;
    return `<tr>
      <td class="text-muted">${i+1}</td>
      <td><strong>${t.fullName}</strong></td>
      <td>${t.phoneNumber || '<span class="text-muted">—</span>'}</td>
      <td>${t.email || '<span class="text-muted">—</span>'}</td>
      <td><span class="fc-badge trainer">${count} тр.</span></td>
      <td>
        <button class="btn-icon edit me-1" onclick="openModal(${t.id})">✏️</button>
        <button class="btn-icon del" onclick="deleteItem(${t.id},'${t.fullName}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Редактировать тренера' : 'Добавить тренера';
  document.getElementById('passwordGroup').style.display = id ? 'none' : '';
  if (id) {
    const t = allTrainers.find(x => x.id === id);
    document.getElementById('fFullName').value = t.fullName;
    document.getElementById('fPhone').value    = t.phoneNumber || '';
    document.getElementById('fEmail').value    = t.email || '';
  } else {
    ['fFullName','fPhone','fEmail','fPassword'].forEach(id => document.getElementById(id).value = '');
  }
  new bootstrap.Modal(document.getElementById('crudModal')).show();
}

async function saveTrainer() {
  const fullName = document.getElementById('fFullName').value.trim();
  if (!fullName) { showToast('Введите ФИО', 'warning'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳...'; btn.disabled = true;
  try {
    if (editingId) {
      await api.put(`/users/${editingId}`, { roleId: 2, fullName, phoneNumber: document.getElementById('fPhone').value || null, email: document.getElementById('fEmail').value || null });
      showToast('Тренер обновлён');
    } else {
      const pwd = document.getElementById('fPassword').value;
      if (!pwd) { showToast('Введите пароль','warning'); return; }
      await api.post('/users', { roleId: 2, fullName, phoneNumber: document.getElementById('fPhone').value || null, email: document.getElementById('fEmail').value || null, password: pwd });
      showToast('Тренер добавлен');
    }
    bootstrap.Modal.getInstance(document.getElementById('crudModal')).hide();
    loadData();
  } catch(e) { showToast('Ошибка сохранения','danger'); }
  finally { btn.textContent = '💾 Сохранить'; btn.disabled = false; }
}

function deleteItem(id, name) {
  confirmDelete(`Удалить тренера «${name}»?`, async () => {
    try { await api.delete(`/users/${id}`); showToast('Тренер удалён'); loadData(); }
    catch(e) { showToast('Ошибка удаления','danger'); }
  });
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderTable(allTrainers.filter(t => t.fullName.toLowerCase().includes(e.target.value.toLowerCase())));
});

loadData();
</script>
</body>
</html>
